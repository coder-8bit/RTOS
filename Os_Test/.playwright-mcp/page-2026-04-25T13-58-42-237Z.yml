  - heading "10. Ứng dụng thực tế trong hệ automotive" [level=2] [ref=e1723]
  - 'heading "10.1 UART RX: ISR đánh thức parser task" [level=3] [ref=e1724]'
  - paragraph [ref=e1725]: Ứng dụng kinh điển nhất là UART RX. ISR không nên parse frame dài. ISR chỉ ghi byte vào ring buffer và set event để task xử lý sau.
  - generic [ref=e1726]:
    - generic [ref=e1727]: "Use Case: UART RX ISR → Parser Task"
    - document [ref=e1729]:
      - generic [ref=e1732]: Task_UartParser
      - generic [ref=e1735]: SetEvent()
      - generic [ref=e1738]: Ring Buffer
      - generic [ref=e1741]: USART1_IRQHandler
      - generic [ref=e1745]: Task_UartParser
      - generic [ref=e1749]: SetEvent()
      - generic [ref=e1753]: Ring Buffer
      - generic [ref=e1757]: USART1_IRQHandler
      - generic [ref=e1758]: push received byte
      - generic [ref=e1759]: SetEvent(Task_UartParser, EV_UART_RX)
      - generic [ref=e1760]: unblock when waiting
      - generic [ref=e1761]: WaitEvent(EV_UART_RX) returns
      - generic [ref=e1763]: pop bytes and parse frame
      - generic [ref=e1764]: ClearEvent(EV_UART_RX)
  - paragraph [ref=e1765]: Thiết kế đúng là event chỉ báo "có dữ liệu", còn dữ liệu nằm trong ring buffer. Nếu ISR nhận 10 byte liên tiếp, event bit vẫn chỉ là 1, nhưng ring buffer giữ đủ 10 byte.
  - 'heading "10.2 CAN RX: CanIf báo event cho application task" [level=3] [ref=e1766]'
  - paragraph [ref=e1767]: Trong gateway automotive, CAN driver hoặc CanIf nhận PDU rồi đánh thức task xử lý application. Event giúp tách phần thời gian gấp trong ISR khỏi phần xử lý nghiệp vụ.
