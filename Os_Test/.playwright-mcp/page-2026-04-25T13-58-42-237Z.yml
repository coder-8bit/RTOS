  - heading "1.3 Câu hỏi trung tâm của bài" [level=3] [ref=e150]
  - generic [ref=e151]: Nếu task đang chạy không có việc để làm, nó nên bận chờ bằng vòng lặp polling, hay nên tự chuyển sang WAITING để CPU chạy task khác?
  - paragraph [ref=e152]: Event API trả lời câu hỏi này. Nó biến một task từ kiểu "luôn chạy để kiểm tra cờ" thành kiểu "ngủ đến khi có tín hiệu". Đây là một bước rất quan trọng trong RTOS vì nó giảm lãng phí CPU, giảm jitter cho task khác, và làm flow phần mềm rõ ràng hơn.
