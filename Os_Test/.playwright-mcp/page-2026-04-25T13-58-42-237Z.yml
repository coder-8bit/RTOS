  - heading "1. Mục tiêu và bức tranh tổng thể" [level=2] [ref=e56]
  - paragraph [ref=e57]:
    - text: Sau bài này, người học cần hiểu được vì sao event là bước tiếp theo tự nhiên sau scheduler. Trước đó task chỉ chạy theo autostart, alarm hoặc schedule table. Với event, task có thể chủ động
    - strong [ref=e58]: ngủ
    - text: khi chưa có việc, và chỉ quay lại ready queue khi có tín hiệu phù hợp.
  - generic [ref=e59]:
    - strong [ref=e60]: "Chuỗi runtime cần nắm:"
    - code [ref=e61]: Task Consumer chạy → WaitEvent(mask) → chưa có event → state = WAITING → scheduler chạy Producer → Producer SetEvent(Consumer, mask) → Consumer state = READY → scheduler preempt Producer nếu Consumer ưu tiên cao hơn → Consumer GetEvent/ClearEvent → Consumer xử lý xong
