  - generic [ref=e1998]:
    - strong [ref=e1999]: "Kết luận kỹ thuật:"
    - text: "Sau bài này, kernel không còn chỉ là scheduler chạy task theo ready queue. Nó đã có primitive blocking đầu tiên: task có thể tự rời CPU khi chưa có việc và quay lại khi được báo event. Đây là nền quan trọng trước khi học OSEK event service đầy đủ."
